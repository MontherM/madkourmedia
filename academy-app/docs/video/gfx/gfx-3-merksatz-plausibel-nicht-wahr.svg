<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- AI Academy · Lektion 1 · GFX 3: Merksatz-Karte -->
  <defs>
    <style>
      .h { font-family: 'Syne', 'Arial Black', sans-serif; font-weight: 800; }
      .b { font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1920" height="1080" fill="#f7f3ec"/>
  <!-- dot texture corners -->
  <g fill="rgba(27,25,23,0.14)">
    <circle cx="140" cy="140" r="2"/><circle cx="200" cy="140" r="2"/><circle cx="260" cy="140" r="2"/><circle cx="140" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="140" cy="260" r="2"/>
    <circle cx="1780" cy="940" r="2"/><circle cx="1720" cy="940" r="2"/><circle cx="1660" cy="940" r="2"/><circle cx="1780" cy="880" r="2"/><circle cx="1720" cy="880" r="2"/><circle cx="1780" cy="820" r="2"/>
  </g>

  <!-- Big card, slightly rotated, hard offset shadow -->
  <g transform="rotate(-1.2 960 540)">
    <rect x="336" y="316" width="1280" height="480" rx="28" fill="#1b1917"/>
    <rect x="320" y="300" width="1280" height="480" rx="28" fill="#fffdf8" stroke="#1b1917" stroke-width="3"/>

    <!-- Eyebrow -->
    <rect x="420" y="392" width="26" height="4" fill="#d3450f"/>
    <text x="462" y="402" class="b" font-size="24" letter-spacing="5" fill="#d3450f">MERK DIR EINEN SATZ</text>

    <!-- The sentence -->
    <text x="420" y="530" class="h" font-size="110" fill="#1b1917">Plausibel <tspan fill="#d3450f">≠</tspan> wahr.</text>

    <!-- marker highlight under "wahr." -->
    <rect x="1024" y="546" width="300" height="26" fill="rgba(211,69,15,0.25)"/>

    <text x="420" y="640" class="b" font-size="34" fill="#57504a">Die KI macht ihren Job: überzeugender Text.</text>
    <text x="420" y="692" class="b" font-size="34" fill="#57504a">Das Prüfen bleibt deiner.</text>
  </g>

  <!-- Sticker -->
  <g transform="rotate(3 1520 330)">
    <rect x="1380" y="296" width="280" height="70" rx="35" fill="#d3450f"/>
    <text x="1520" y="341" text-anchor="middle" class="b" font-size="26" font-weight="600" letter-spacing="1" fill="#ffffff">REGEL NR. 1</text>
  </g>

  <text x="120" y="1010" class="b" font-size="22" fill="#8c847b">AI Academy · Lektion 1 — Was ist KI, und was nicht?</text>
</svg>
