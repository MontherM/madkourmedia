name: Knowledge Graph

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install graphify
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/uv" tool install graphifyy

      - name: Rebuild graph (AST only, no LLM)
        run: |
          graphify update . --force
          graphify export html

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp graphify-out/graph.html _site/index.html
          cp graphify-out/graph.json _site/graph.json
          cp graphify-out/GRAPH_REPORT.md _site/GRAPH_REPORT.md

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
